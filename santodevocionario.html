<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devocionário — Santos, Santas e Nossas Senhoras</title>
<style>
  :root{
    --indigo:#1B2541;
    --indigo-deep:#11172B;
    --gold:#C9A227;
    --gold-bright:#E8C766;
    --parchment:#F4ECD8;
    --parchment-dim:#E5DCC2;
    --ink:#2A2118;
    --line: rgba(201,162,39,0.35);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --display: 'Cinzel', Georgia, serif;
    --sans: 'Lato', Arial, sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:wght@400;700&display=swap');

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--indigo-deep);color:var(--parchment);font-family:var(--serif);}

  body{
    background:
      radial-gradient(circle at 50% 0%, rgba(201,162,39,0.08), transparent 60%),
      linear-gradient(180deg, var(--indigo-deep), var(--indigo) 40%, var(--indigo-deep));
    min-height:100vh;
  }

  header{
    text-align:center;
    padding:56px 20px 28px;
    position:relative;
  }
  header::after{
    content:"";
    display:block;
    width:140px;height:1px;
    margin:18px auto 0;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .eyebrow{
    font-family:var(--sans);
    letter-spacing:3px;
    text-transform:uppercase;
    font-size:11px;
    color:var(--gold-bright);
    opacity:.85;
  }
  h1{
    font-family:var(--display);
    font-weight:700;
    font-size:clamp(28px,5vw,46px);
    margin:10px 0 6px;
    letter-spacing:1px;
    color:var(--parchment);
    text-shadow:0 0 24px rgba(201,162,39,0.25);
  }
  .subtitle{
    font-style:italic;
    color:var(--parchment-dim);
    font-size:17px;
    max-width:520px;
    margin:0 auto;
  }

  .controls{
    max-width:880px;
    margin:0 auto 30px;
    padding:0 20px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .search-wrap{
    position:relative;
  }
  #search{
    width:100%;
    padding:14px 18px 14px 44px;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(244,236,216,0.06);
    color:var(--parchment);
    font-family:var(--sans);
    font-size:15px;
    outline:none;
    transition:border-color .2s, background .2s;
  }
  #search::placeholder{color:rgba(244,236,216,0.5);}
  #search:focus{border-color:var(--gold); background:rgba(244,236,216,0.1);}
  .search-icon{
    position:absolute; left:16px; top:50%; transform:translateY(-50%);
    color:var(--gold-bright); font-size:15px; opacity:.8;
  }

  .filters{
    display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
    font-family:var(--sans);
  }
  .filter-pill{
    padding:8px 18px;
    border-radius:999px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--parchment-dim);
    font-size:13px;
    letter-spacing:.5px;
    cursor:pointer;
    transition:all .2s;
  }
  .filter-pill:hover{border-color:var(--gold-bright); color:var(--parchment);}
  .filter-pill.active{
    background:var(--gold);
    color:var(--indigo-deep);
    border-color:var(--gold);
    font-weight:700;
  }

  .grid{
    max-width:1100px;
    margin:0 auto;
    padding:0 20px 80px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));
    gap:18px;
  }

  .card{
    background:linear-gradient(160deg, rgba(244,236,216,0.07), rgba(244,236,216,0.02));
    border:1px solid var(--line);
    border-radius:4px;
    padding:22px 18px 20px;
    cursor:pointer;
    position:relative;
    transition:transform .25s, border-color .25s, background .25s;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(circle at 30% 0%, rgba(201,162,39,0.18), transparent 55%);
    opacity:0;
    transition:opacity .3s;
  }
  .card:hover{ transform:translateY(-3px); border-color:var(--gold-bright); }
  .card:hover::before{opacity:1;}

  .initial{
    font-family:var(--display);
    font-size:30px;
    color:var(--gold-bright);
    width:48px;height:48px;
    border-radius:50%;
    border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:14px;
    box-shadow:0 0 18px rgba(201,162,39,0.25) inset;
    position:relative;
    z-index:1;
  }
  .card-name{
    font-family:var(--display);
    font-size:18px;
    line-height:1.3;
    margin:0 0 6px;
    color:var(--parchment);
    position:relative; z-index:1;
  }
  .card-tag{
    font-family:var(--sans);
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--gold-bright);
    opacity:.8;
    position:relative; z-index:1;
  }
  .card-padroeiro{
    font-family:var(--sans);
    font-size:13px;
    color:var(--parchment-dim);
    margin-top:10px;
    font-style:italic;
    position:relative; z-index:1;
  }

  .empty{
    text-align:center;
    font-family:var(--sans);
    color:var(--parchment-dim);
    padding:60px 20px;
    grid-column:1/-1;
  }

  /* Modal */
  .overlay{
    position:fixed; inset:0;
    background:rgba(10,13,25,0.78);
    backdrop-filter:blur(3px);
    display:none;
    align-items:center; justify-content:center;
    padding:20px;
    z-index:50;
  }
  .overlay.open{display:flex;}
  .modal{
    background:linear-gradient(160deg, var(--indigo), var(--indigo-deep));
    border:1px solid var(--gold);
    border-radius:6px;
    max-width:560px;
    width:100%;
    max-height:85vh;
    overflow-y:auto;
    padding:36px 32px 30px;
    position:relative;
    box-shadow:0 0 60px rgba(201,162,39,0.15);
  }
  .modal-close{
    position:absolute; top:16px; right:18px;
    background:none; border:none;
    color:var(--parchment-dim);
    font-size:22px;
    cursor:pointer;
    font-family:var(--sans);
    line-height:1;
  }
  .modal-close:hover{color:var(--gold-bright);}
  .modal .initial{width:64px;height:64px;font-size:38px;margin-bottom:18px;}
  .modal h2{
    font-family:var(--display);
    font-size:26px;
    margin:0 0 4px;
    color:var(--parchment);
  }
  .modal .card-tag{font-size:12px;}
  .modal-section{
    margin-top:22px;
    padding-top:16px;
    border-top:1px solid var(--line);
  }
  .modal-section h3{
    font-family:var(--sans);
    text-transform:uppercase;
    letter-spacing:1.5px;
    font-size:11px;
    color:var(--gold-bright);
    margin:0 0 8px;
  }
  .modal-section p{
    font-size:17px;
    line-height:1.6;
    margin:0;
    color:var(--parchment-dim);
  }
  .oracao{
    font-style:italic;
    font-size:18px;
    line-height:1.7;
    color:var(--parchment);
    border-left:2px solid var(--gold);
    padding-left:16px;
  }

  footer{
    text-align:center;
    font-family:var(--sans);
    font-size:12px;
    color:rgba(244,236,216,0.4);
    padding:20px;
  }

  @media (prefers-reduced-motion: reduce){
    .card, .card::before{transition:none;}
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Devocionário rápido</div>
  <h1>Santos, Santas &amp; Nossas Senhoras</h1>
  <p class="subtitle">Origem, padroado, uma curiosidade e uma oração breve — tudo em um toque.</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">✦</span>
    <input id="search" type="text" placeholder="Buscar por nome, padroado ou cidade...">
  </div>
  <div class="filters" id="filters">
    <button class="filter-pill active" data-filter="todos">Todos</button>
    <button class="filter-pill" data-filter="santo">Santos</button>
    <button class="filter-pill" data-filter="santa">Santas</button>
    <button class="filter-pill" data-filter="senhora">Nossas Senhoras</button>
    <button class="filter-pill" data-filter="beato">Beatos / Veneráveis</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<footer>Toque em um card para ver detalhes completos · feito com devoção</footer>
